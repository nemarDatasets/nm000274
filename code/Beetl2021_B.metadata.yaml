methodology: Task 2 is centred on transfer learning for BCI, addressing motor imagery decoding. The challenge lies in transferring
  from multiple data sets, which use different EEG setups comprising hundreds of users, to a set of new users that need to
  be up and running with only minutes worth of calibration data (transfer across subjects and data sets). Three source data
  sets (Cho2017, BNCI2014, PhysionetMI) are provided as training data. The algorithms are evaluated on new data sets with
  different setups, including differences in electrode channels, task definitions, and subjects. Dataset B is from Weibo2014
  with 32 channels selected around motor cortex. For the leaderboard phase (subjects 3-5), only training data is provided.
  For the final phase (subjects 4-5), both training and testing data are included.
