abstract: 'Transfer learning and meta-learning offer some of the most promising avenues to unlock the scalability of healthcare
  and consumer technologies driven by biosignal data. This is because current methods cannot generalise well across human
  subjects'' data and handle learning from different heterogeneously collected data sets, thus limiting the scale of training
  data. Task 2 is a 3-way motor imagery classification challenge (left-hand, right-hand motor imagery and ''reject'') that
  gets at the heart of the problem of current BCI systems: motor imagery data is exhausting for subjects to record, and historically
  has been difficult to use in a cross-subject and cross-dataset manner. Dataset B contains data from the Weibo2014 dataset
  with 32 channels around the motor cortex selected, sampled at 200 Hz.'
